<head>

    <link rel="stylesheet" href="https://sabkacode.vercel.app/style.css">
    <style>
        :root {
            --primary: #3498db;
            --primary-dark: #1f3650;
            --surface: rgba(255, 255, 255, 0.12);
            --text: #102030;
            --white: #ffffff;
            --shadow: 0 16px 40px rgba(17, 39, 61, 0.18);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: var(--text);
        }

        .site-shell {
            width: min(1180px, calc(100% - 24px));
            margin: 18px auto;
        }

        /* ─── TOPBAR ─── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            padding: 18px 22px;
            border-radius: 24px;
            background: linear-gradient(135deg, #3498db 0%, #1f3650 100%);
            color: var(--white);
            box-shadow: var(--shadow);
            flex-direction: column;
            text-align: center;
        }

        .brand-block {
            display: flex;
            align-items: center;
            gap: 16px;
            justify-content: center;
            text-decoration: none;
            color: var(--white);
        }

        .brand-mark {
            width: 58px; height: 58px;
            display: grid; place-items: center;
            border-radius: 18px;
            background: rgba(255,255,255,.16);
            font-size: 28px;
        }

        .brand-copy h1 { margin: 0; font-size: 30px; line-height: 1.1; }
        .brand-copy p  { margin: 6px 0 0; color: rgba(255,255,255,.88); font-size: 14px; }

        .quick-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .quick-actions a {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 11px 14px; border-radius: 999px;
            background: rgba(255,255,255,.12);
            color: var(--white); text-decoration: none;
            font-weight: 700; font-size: 14px;
        }

        /* ─── SENTINEL (invisible trigger point) ─── */
        .nav-sentinel {
            height: 1px;
            margin-top: 14px;
            pointer-events: none;
            visibility: hidden;
        }

        /* ─── GHOST (holds space when nav is fixed) ─── */
        .nav-ghost { display: none; }
        .nav-ghost.is-sticky { display: block; }

        /* ─── NAV CARD ─── */
        .nav-card {
            padding: 12px;
            border-radius: 24px;
            background: rgba(31,54,80,.96);
            box-shadow: var(--shadow);
            transition: border-radius .25s ease, box-shadow .25s ease;
        }

        .nav-card.is-sticky {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 999;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 4px 28px rgba(17,39,61,.35);
            animation: slideDown .26s ease;
        }

        @keyframes slideDown {
            from { transform: translateY(-110%); opacity: 0; }
            to   { transform: translateY(0);     opacity: 1; }
        }

        .nav-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex-direction: column;
            width: min(1180px, calc(100% - 24px));
            margin: 0 auto;
        }

        .menu-toggle {
            display: none;
            align-items: center; justify-content: center;
            width: 48px; height: 48px;
            border: none; border-radius: 14px;
            background: rgba(255,255,255,.1);
            color: var(--white); font-size: 20px; cursor: pointer;
        }

        .nav-links {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; flex-wrap: wrap; width: 100%;
        }

        .nav-links a, .drop-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 14px; border: none; border-radius: 14px;
            background: transparent; color: var(--white);
            text-decoration: none; cursor: pointer;
            font-size: 15px; font-weight: 700;
        }

        .nav-links a:hover, .drop-btn:hover,
        .drop:hover .drop-btn { background: var(--surface); }

        .drop { position: relative; }

        .dropdown-menu {
            position: absolute; top: calc(100% + 10px); left: 0;
            min-width: 220px; display: none;
            padding: 10px; border-radius: 18px;
            background: #fff;
            box-shadow: 0 20px 36px rgba(15,27,39,.16);
            z-index: 20;
        }
        .dropdown-menu a {
            display: block; padding: 12px 14px; border-radius: 12px;
            color: var(--text); text-decoration: none; font-weight: 600;
        }
        .dropdown-menu a:hover { background: #eef7ff; }
        .drop:hover .dropdown-menu { display: block; }

        /* ─── FLOATING SOCIAL ─── */
        .floating-button {
            position: fixed; right: 22px; bottom: 24px;
            width: 58px; height: 58px;
            display: grid; place-items: center;
            border: none; border-radius: 50%;
            background: #fff; color: var(--primary-dark);
            font-size: 38px; box-shadow: var(--shadow);
            cursor: pointer; z-index: 40;
        }

        .social-stack {
            position: fixed; right: 22px; bottom: 94px;
            display: grid; gap: 12px; z-index: 39;
        }
        .social-stack a {
            width: 54px; height: 54px;
            display: grid; place-items: center;
            border-radius: 50%; color: #fff;
            text-decoration: none; font-size: 24px;
            box-shadow: 0 14px 28px rgba(17,39,61,.2);
            opacity: 0; transform: translateY(12px) scale(.82);
            pointer-events: none; transition: .25s ease;
        }
        .social-stack a:nth-child(1) { background: #229ed9; }
        .social-stack a:nth-child(2) { background: #25d366; }
        .social-stack a:nth-child(3) { background: #ff5b5b; }
        .social-stack.open a {
            opacity: 1; transform: translateY(0) scale(1); pointer-events: auto;
        }

        /* ─── BACK TO TOP ─── */
        #backToTop {
            position: fixed;
            left: 22px; bottom: 24px;
            width: 52px; height: 52px;
            display: grid; place-items: center;
            border: none; border-radius: 50%;
            background: linear-gradient(135deg, #3498db 0%, #1f3650 100%);
            color: #fff; font-size: 20px;
            box-shadow: 0 6px 22px rgba(52,152,219,.5);
            cursor: pointer; z-index: 40;
            opacity: 0; visibility: hidden;
            transform: translateY(14px) scale(.85);
            transition: opacity .3s, visibility .3s, transform .3s, box-shadow .2s;
        }
        #backToTop.show {
            opacity: 1; visibility: visible;
            transform: translateY(0) scale(1);
        }
        #backToTop:hover {
            box-shadow: 0 10px 30px rgba(52,152,219,.65);
            transform: translateY(-3px) scale(1.06);
        }
        #backToTop:active { transform: scale(.94); }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 860px) {
            .topbar { align-items: center; }
            .nav-row { width: 100%; align-items: center; flex-direction: column; }
            .menu-toggle { display: inline-flex; }
            .nav-links {
                display: none; width: 100%;
                flex-direction: column; align-items: stretch; margin-top: 12px;
            }
            .nav-links.open { display: flex; }
            .nav-links a, .drop-btn {
                width: 100%; justify-content: flex-start;
                background: rgba(255,255,255,.04);
            }
            .drop { width: 100%; }
            .drop-btn { position: relative; padding-right: 44px; }
            .drop-btn .fa-chevron-down { position: absolute; right: 16px; }
            .dropdown-menu { position: static; display: none; min-width: 100%; margin-top: 8px; }
            .drop.open .dropdown-menu { display: block; }
        }
    </style>
</head>
